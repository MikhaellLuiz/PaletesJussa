<h2>Agendar coleta de paletes</h2>

<form action="https://formsubmit.co/paletes@leitejussara.com" method="POST">

<input type="text" name="empresa" placeholder="Nome da empresa" required>

<input type="text" name="nome" placeholder="Seu nome" required>

<input type="tel" name="telefone" placeholder="Telefone" required>

<input type="text" name="endereco" placeholder="Endereço da coleta" required>

<input type="number" name="quantidade" placeholder="Quantidade de paletes" required>

<select name="tipo">
<option value="">Tipo de palete</option>
<option>PBR</option>
<option>Descartável</option>
<option>Misto</option>
</select>

<input type="date" name="data">

<textarea name="observacao" placeholder="Observações"></textarea>

<button type="submit">Agendar coleta</button>

</form>
